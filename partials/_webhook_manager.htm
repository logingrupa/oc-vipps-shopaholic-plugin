<script type="module">
    /**
     * Vipps Webhook Manager — updates the webhook list after AJAX responses.
     * Listens to October CMS AJAX complete events and replaces #vippsWebhookList
     * with the 'vipps_webhook_list' key from the JSON response.
     */
    const CONTAINER_ID = 'vippsWebhookList';
    const RESPONSE_KEY = 'vipps_webhook_list';

    const VIPPS_HANDLERS = new Set([
        'onVippsRegisterWebhook',
        'onVippsListWebhooks',
        'onVippsDeleteWebhook',
    ]);

    document.addEventListener('ajax:done', (event) => {
        const { context, data } = event.detail ?? {};

        if (!context?.handler || !VIPPS_HANDLERS.has(context.handler)) {
            return;
        }

        if (data?.[RESPONSE_KEY]) {
            const container = document.getElementById(CONTAINER_ID);
            if (container) {
                container.innerHTML = data[RESPONSE_KEY];
            }
        }

        // After successful register, show that the webhook secret field was populated
        if (context.handler === 'onVippsRegisterWebhook' && data?.[RESPONSE_KEY]) {
            const secretInput = document.querySelector('[data-sensitive-input][name*="vipps_webhook_secret"]');
            if (secretInput && !secretInput.value) {
                secretInput.value = '__hidden__';
                secretInput.type = 'password';
            }
        }
    });

</script>
